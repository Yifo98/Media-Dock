name: Windows package gate

on:
  workflow_dispatch:
    inputs:
      yt_dlp_version:
        description: Exact yt-dlp release tag to package
        required: true
        default: "2026.07.04"

jobs:
  verify-windows-package:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.1

      - name: Install dependencies
        run: npm ci

      - name: Prepare Windows FFmpeg runtime
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "ffmpeg-win.zip"
          $extract = Join-Path $env:RUNNER_TEMP "ffmpeg-win"
          $runtime = Join-Path $env:RUNNER_TEMP "media-dock-runtime"
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip" -OutFile $archive
          Expand-Archive -LiteralPath $archive -DestinationPath $extract -Force
          $ffmpeg = Get-ChildItem -LiteralPath $extract -Recurse -File -Filter "ffmpeg.exe" | Select-Object -First 1
          $ffprobe = Get-ChildItem -LiteralPath $extract -Recurse -File -Filter "ffprobe.exe" | Select-Object -First 1
          if (-not $ffmpeg -or -not $ffprobe) { throw "FFmpeg runtime files were not found." }
          New-Item -ItemType Directory -Force -Path $runtime | Out-Null
          Copy-Item -LiteralPath $ffmpeg.FullName -Destination (Join-Path $runtime "ffmpeg.exe")
          Copy-Item -LiteralPath $ffprobe.FullName -Destination (Join-Path $runtime "ffprobe.exe")
          Get-ChildItem -LiteralPath $ffmpeg.DirectoryName -File -Filter "*.dll" | Copy-Item -Destination $runtime
          "MEDIA_DOCK_RUNTIME=$runtime" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run packaging tests
        run: npm run test:windows-package

      - name: Build and smoke-test Windows share package
        shell: pwsh
        run: |
          $deno = (Get-Command "deno.exe").Source
          & ./scripts/build-shareable-package.ps1 `
            -EnvScriptsDir $env:MEDIA_DOCK_RUNTIME `
            -DenoPath $deno `
            -YtDlpVersion "${{ inputs.yt_dlp_version }}"
          if (-not (Test-Path -LiteralPath "release/SHA256SUMS.txt")) {
            throw "Windows smoke tests did not produce SHA256SUMS.txt."
          }

      - name: Upload verified Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: media-dock-windows-verified
          path: |
            release/Media-Dock-share.zip
            release/YT-DLP-WINDOWS.json
            release/SHA256SUMS.txt
