name: macOS native package gate

on:
  workflow_dispatch:
    inputs:
      yt_dlp_version:
        description: Exact yt-dlp release tag to package
        required: true
        default: "2026.07.04"
      signed_release:
        description: Require Developer ID, notarization, and stapling
        required: true
        type: boolean
        default: false

jobs:
  build_candidate:
    runs-on: macos-latest
    timeout-minutes: 75

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies and native media tools
        run: |
          npm ci
          brew install ffmpeg

      - name: Run automated checks
        run: npm test

      - name: Read candidate version
        id: app_version
        run: echo "value=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Prepare Apple notarization key
        if: ${{ inputs.signed_release }}
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          test -n "$APPLE_API_KEY_BASE64"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/AuthKey.p8"

      - name: Build on native macOS
        env:
          YTDLP_VERSION: ${{ inputs.yt_dlp_version }}
          FFMPEG_SOURCE: Homebrew formula installed by macOS package gate
          MEDIA_DOCK_SIGNED_RELEASE: ${{ inputs.signed_release && '1' || '0' }}
          CSC_LINK: ${{ inputs.signed_release && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ inputs.signed_release && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_API_KEY: ${{ inputs.signed_release && format('{0}/AuthKey.p8', runner.temp) || '' }}
          APPLE_API_KEY_ID: ${{ inputs.signed_release && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ inputs.signed_release && secrets.APPLE_API_ISSUER || '' }}
        run: |
          export YTDLP_ENV_ROOT="$(brew --prefix)"
          if [[ "$MEDIA_DOCK_SIGNED_RELEASE" != "1" ]]; then
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER
          fi
          npm run dist:mac

      - name: Verify bundle, startup, runtimes, and release trust
        shell: /bin/zsh -e {0}
        env:
          MEDIA_DOCK_REQUIRE_SIGNING: ${{ inputs.signed_release && '1' || '0' }}
        run: |
          version="${{ steps.app_version.outputs.value }}"
          artifacts=(release/$version/Media-Dock-$version*-mac.zip)
          test "${#artifacts[@]}" -eq 1
          ./scripts/verify-macos-package.sh \
            "${artifacts[1]}" \
            "release/$version/MACOS-RUNTIMES.json" \
            "release/$version/SHA256SUMS-mac.txt" \
            "$version"

      - name: Upload native macOS candidate
        uses: actions/upload-artifact@v4
        with:
          name: media-dock-${{ steps.app_version.outputs.value }}-macos-${{ inputs.signed_release && 'signed-notarized' || 'unsigned-preview' }}
          path: |
            release/${{ steps.app_version.outputs.value }}/Media-Dock-${{ steps.app_version.outputs.value }}*-mac.zip
            release/${{ steps.app_version.outputs.value }}/MACOS-RUNTIMES.json
            release/${{ steps.app_version.outputs.value }}/SHA256SUMS-mac.txt
            release/${{ steps.app_version.outputs.value }}/RELEASE-NOTES.md
          if-no-files-found: error
          retention-days: 14
